<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜜雪核销 | MIXUE Redemption</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            max-width: 380px; width: 100%; text-align: center;
        }
        .header { font-size: 22px; font-weight: bold; color: #c0392b; margin-bottom: 20px; }
        .info {
            background: #fff8f8; border-radius: 12px; padding: 16px;
            text-align: left; margin: 15px 0; line-height: 1.8;
        }
        .info .label { font-weight: bold; color: #666; }
        .info .value { color: #333; font-family: monospace; }
        .status {
            font-size: 18px; font-weight: bold; padding: 10px;
            border-radius: 10px; margin: 15px 0;
        }
        .status.valid { background: #d4edda; color: #155724; }
        .status.used { background: #f8d7da; color: #721c24; }
        button {
            width: 100%; padding: 16px; border: none; border-radius: 30px;
            font-size: 18px; font-weight: bold; cursor: pointer; margin: 8px 0;
        }
        .btn-redeem { background: #e63946; color: white; }
        .btn-redeem:disabled { background: #aaa; cursor: not-allowed; }
        .btn-back { background: #ddd; color: #333; }
        .result { font-size: 16px; font-weight: bold; margin-top: 15px; }
        .success { color: #27ae60; }
        .fail { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🍦 蜜雪冰城 · 优惠核销</div>
        <div class="info">
            <p><span class="label">券 ID：</span><span class="value" id="couponId">-</span></p>
            <p><span class="label">折扣：</span><span class="value" id="discount">-</span></p>
            <p><span class="label">有效期至：</span><span class="value" id="expire">-</span></p>
        </div>
        <div class="status valid" id="statusDisplay">✅ 优惠券有效 | Valid</div>
        <button class="btn-redeem" id="redeemBtn" onclick="redeem()">
            ✅ 确认核销 | Confirm Redemption
        </button>
        <button class="btn-back" onclick="history.back()">
            ← 返回 | Back
        </button>
        <div class="result" id="resultMsg"></div>
    </div>

    <script>
        // 从 URL 读取参数
        const params = new URLSearchParams(window.location.search);
        const couponId = params.get('id') || '-';
        const discount = (params.get('discount') || '20%').replace('%25', '%');
        const expire = params.get('expire') || '-';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_PT6ncqTAWLzj9fCZFHlVl7x7SZ6K_BALVg5UGOXBnIUXq-RIfzkP_MdYUGQDkfk/exec'; // 👈 替换成你的 Google Apps Script 网址

        document.getElementById('couponId').textContent = couponId;
        document.getElementById('discount').textContent = discount;
        document.getElementById('expire').textContent = expire;

        // 检查是否已核销
        async function checkStatus() {
            try {
                const resp = await fetch(SCRIPT_URL + '?action=check&id=' + couponId);
                const data = await resp.json();
                if (data.status === 'used') {
                    document.getElementById('statusDisplay').textContent = '❌ 此券已核销过 | Already Redeemed';
                    document.getElementById('statusDisplay').className = 'status used';
                    document.getElementById('redeemBtn').disabled = true;
                    document.getElementById('redeemBtn').textContent = '已核销 | Redeemed';
                }
            } catch (e) {
                console.log('状态检查失败');
            }
        }

        async function redeem() {
            const btn = document.getElementById('redeemBtn');
            const msg = document.getElementById('resultMsg');
            btn.disabled = true;
            btn.textContent = '核销中... | Processing...';

            try {
                const resp = await fetch(SCRIPT_URL + '?action=redeem&id=' + couponId + '&discount=' + encodeURIComponent(discount) + '&expire=' + expire);
                const data = await resp.json();
                if (data.success) {
                    msg.textContent = '✅ 核销成功！| Redeemed Successfully!';
                    msg.className = 'result success';
                    document.getElementById('statusDisplay').textContent = '✅ 已核销 | Redeemed';
                    document.getElementById('statusDisplay').className = 'status valid';
                    btn.textContent = '已核销 | Redeemed';
                } else {
                    msg.textContent = '❌ ' + (data.reason || '核销失败 | Failed');
                    msg.className = 'result fail';
                    btn.disabled = false;
                    btn.textContent = '重试 | Retry';
                }
            } catch (e) {
                msg.textContent = '❌ 网络错误 | Network Error';
                msg.className = 'result fail';
                btn.disabled = false;
                btn.textContent = '重试 | Retry';
            }
        }

        checkStatus();
    </script>
</body>
</html>
